version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    env_file:
      - .env
    volumes:
      - ./output:/app/output
      - ./logs:/app/logs
      - ./backend/seed_data:/app/seed_data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # CLI runner (one-shot simulation)
  sim-runner:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
      - ./output:/app/output
      - ./logs:/app/logs
    entrypoint: ["python", "scripts/run_simulation.py"]
    command: ["--scenario", "both", "--seed", "42"]
    profiles:
      - cli  # Only runs with: docker compose --profile cli run sim-runner
